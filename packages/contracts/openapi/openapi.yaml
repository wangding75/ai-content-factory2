    PlotLineType:
      type: string
      enum: [main, child]
    PlotLineRelation:
      type: string
      enum: [root, child]
    PlotLineStatus:
      type: string
      enum: [active, completed, archived]
    PlotLine:
      type: object
      additionalProperties: false
      required: [id, project_id, parent_id, type, relation, name, summary, start_chapter, end_chapter, status, sort_order, version, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        project_id: {type: string, format: uuid}
        parent_id: {type: [string, "null"], format: uuid, description: "Null for a root main storyline; otherwise the immediate parent storyline ID."}
        type: {$ref: "#/components/schemas/PlotLineType"}
        relation: {$ref: "#/components/schemas/PlotLineRelation"}
        name: {type: string, minLength: 1, maxLength: 120}
        summary: {type: string, maxLength: 5000}
        start_chapter: {type: [integer, "null"], minimum: 1}
        end_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/PlotLineStatus"}
        sort_order: {type: integer, minimum: 0}
        version: {type: integer, minimum: 1}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
      description: Main storylines have type main, relation root, and null parent_id. Child storylines have type child, relation child, and a parent_id in the same project. When both chapter bounds are integers, start_chapter must not exceed end_chapter.
    PlotLineTreeNode:
      type: object
      additionalProperties: false
      required: [id, project_id, parent_id, type, relation, name, summary, start_chapter, end_chapter, status, sort_order, version, created_at, updated_at, children]
      properties:
        id: {type: string, format: uuid}
        project_id: {type: string, format: uuid}
        parent_id: {type: [string, "null"], format: uuid}
        type: {$ref: "#/components/schemas/PlotLineType"}
        relation: {$ref: "#/components/schemas/PlotLineRelation"}
        name: {type: string, minLength: 1, maxLength: 120}
        summary: {type: string, maxLength: 5000}
        start_chapter: {type: [integer, "null"], minimum: 1}
        end_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/PlotLineStatus"}
        sort_order: {type: integer, minimum: 0}
        version: {type: integer, minimum: 1}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        children: {type: array, items: {$ref: "#/components/schemas/PlotLineTreeNode"}}
    CreateMainPlotLineRequest:
      type: object
      additionalProperties: false
      required: [name, summary, start_chapter, end_chapter, status, sort_order]
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        summary: {type: string, maxLength: 5000}
        start_chapter: {type: [integer, "null"], minimum: 1}
        end_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/PlotLineStatus"}
        sort_order: {type: integer, minimum: 0}
      description: Creates a main/root storyline. When both chapter bounds are integers, start_chapter must not exceed end_chapter.
    CreateChildPlotLineRequest:
      type: object
      additionalProperties: false
      required: [name, summary, start_chapter, end_chapter, status, sort_order]
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        summary: {type: string, maxLength: 5000}
        start_chapter: {type: [integer, "null"], minimum: 1}
        end_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/PlotLineStatus"}
        sort_order: {type: integer, minimum: 0}
      description: Creates a child storyline under the path storylineId. When both chapter bounds are integers, start_chapter must not exceed end_chapter.
    UpdatePlotLineRequest:
      type: object
      additionalProperties: false
      required: [expected_version]
      minProperties: 2
      properties:
        expected_version: {type: integer, minimum: 1}
        name: {type: string, minLength: 1, maxLength: 120}
        summary: {type: string, maxLength: 5000}
        start_chapter: {type: [integer, "null"], minimum: 1}
        end_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/PlotLineStatus"}
        sort_order: {type: integer, minimum: 0}
      description: parent_id, relation, project_id, and type cannot be changed. When both chapter bounds are integers, start_chapter must not exceed end_chapter.
