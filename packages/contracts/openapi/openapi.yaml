    patch:
      operationId: updateDistributionPlatform
      description: Updates mutable fields with optimistic locking. platformType, integrationStatus and enabled are read-only and rejected if supplied. Omitted credential preserves it; credential replaces it only when non-empty; clearCredential=true explicitly clears it. An empty credential never clears a stored credential.
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpdateDistributionPlatformRequest"}}}}
      responses:
        "200": {description: Updated distribution platform., content: {application/json: {schema: {$ref: "#/components/schemas/DistributionPlatformEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
  /api/v1/projects/{projectId}/workflow-bindings:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectWorkflowBindings
      description: >
        Returns exactly four fixed stages (chapter_planning, content_generation, review, rewrite)
        with their current binding status and read-only global workflow configuration summary.
        Stages without a binding return null for binding and workflowConfigurationSummary.
        bound is true only when a binding exists; it does not imply the workflow is enabled,
        integrated, or executable. workflowConfigurationSummary.enabled, .integrationStatus,
        .connectionType, and .connectionName are read from the global workflow configuration.
        This is a read-only endpoint that produces no audit events.
      responses:
        "200":
          description: Four fixed stages with binding status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowBindingStageListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/projects/{projectId}/workflow-bindings/{stage}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/Stage"
    put:
      operationId: putProjectWorkflowBinding
      description: >
        Creates or replaces a project-stage binding. Idempotency-Key is required and
        operation-scoped. For a first-time bind (no existing binding), omit expectedVersion.
        For a replacement, expectedVersion must match the current binding version.
        The target workflow must be enabled and its applicableStages must include the
        requested stage. A same-key same-payload retry returns the original result without
        version increment or audit. A same-key different-payload retry returns 409.
        Replacing with the same workflowConfigurationId (no change) when expectedVersion
        matches returns the current result without version change or audit.
        Concurrent first-time binds are guarded by UNIQUE(project_id, stage) and the
        loser returns 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutProjectWorkflowBindingRequest"
      responses:
        "201":
          description: Binding created (first bind), or idempotent replay of a create.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowBindingStageEnvelope"
        "200":
          description: Binding replaced, or unchanged current result for an identical retry or same-workflow no-change request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowBindingStageEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      operationId: deleteProjectWorkflowBinding
      description: >
        Removes a project-stage binding without deleting the global workflow configuration.
        Idempotency-Key is required and expectedVersion must match the current binding version.
        A same-key same-payload retry returns the original result without duplicate audit.
        The binding is physically deleted; audit history is preserved.
        An absent binding returns 404.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/ExpectedBindingVersionQuery"
      responses:
        "200":
          description: Binding removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnbindProjectWorkflowBindingResultEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
