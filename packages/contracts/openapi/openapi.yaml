      responses: {"200": {description: "Adopted or no_change result. adopted supplies a new Revision whose id is ChapterPlan.currentRevisionId; no_change supplies revision=null and leaves Candidate non-adopted.", content: {application/json: {schema: {$ref: "#/components/schemas/AdoptChapterPlanCandidateEnvelope"}}}}, "400": {$ref: "#/components/responses/BadRequest"}, "404": {$ref: "#/components/responses/NotFound"}, "409": {description: "Candidate state, stale baseline, version, chapter number, revision sequence, or idempotency conflict.", content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningSingleAdoptConflictErrorEnvelope"}, examples: {staleCandidate: {$ref: "#/components/examples/ChapterPlanningStaleCandidateError"}}}}}}
  /api/v1/chapter-plan-candidates/{candidateId}/discard:
