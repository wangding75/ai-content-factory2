      responses: {"200": {description: Itemized independent adoption result; partial success is normal and each item is one transaction., content: {application/json: {schema: {$ref: "#/components/schemas/BulkAdoptChapterPlanCandidatesEnvelope"}}}}, "400": {$ref: "#/components/responses/BadRequest"}, "404": {$ref: "#/components/responses/NotFound"}, "409": {description: Batch optimistic-lock or idempotency conflict before item processing., content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningBulkAdoptConflictErrorEnvelope"}}}}}
  /api/v1/chapter-plan-candidate-batches/{batchId}/abandon:
