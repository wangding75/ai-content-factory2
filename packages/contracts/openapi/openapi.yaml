      minProperties: 2
      properties:
        expected_version: {type: integer, minimum: 1}
        title: {type: string, minLength: 1, maxLength: 120}
        description: {type: string, maxLength: 5000}
        priority: {$ref: "#/components/schemas/ForeshadowingPriority"}
        planted_plot_line_id: {type: [string, "null"], format: uuid}
        payoff_plot_line_id: {type: [string, "null"], format: uuid}
        planned_plant_chapter: {type: [integer, "null"], minimum: 1}
        planned_payoff_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/ForeshadowingStatus"}
      description: planted_plot_line_id and payoff_plot_line_id are independently optional. Each non-null ID must exist and remain in the foreshadowing project; the two IDs may reference different storylines. Status transitions are planned to planted and planted to paid_off only; an unchanged status is an idempotent update. When both chapter values are integers, planned_plant_chapter must not exceed planned_payoff_chapter.
    ForeshadowingList:
      type: object
      additionalProperties: false
      required: [items, total, limit, offset]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/Foreshadowing"}}
        total: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 100}
        offset: {type: integer, minimum: 0}
    ForeshadowingEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: {$ref: "#/components/schemas/Foreshadowing"}
        request_id: {type: string}
    ForeshadowingListEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: {$ref: "#/components/schemas/ForeshadowingList"}
        request_id: {type: string}
    ChapterPlanStatus:
      type: string
      enum: [pending_confirmation, confirmed]
    ChapterPlanSource:
      type: string
      enum: [mock_generated]
    ChapterPlanRelation:
      type: string
      enum: [primary, secondary]
    ChapterPlanStorylineRef:
      type: object
      additionalProperties: false
      required: [storyline_id, relation]
      properties:
        storyline_id: {type: string, format: uuid}
        relation: {$ref: "#/components/schemas/ChapterPlanRelation"}
    ChapterPlan:
      type: object
      additionalProperties: false
      required: [id, project_id, chapter_no, title, summary, status, source, storyline_refs_json, material_refs_json, foreshadowing_refs_json, chapter_goal, creation_notes, confirmed_at, version, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        project_id: {type: string, format: uuid}
        chapter_no: {type: integer, minimum: 1}
        title: {type: string, minLength: 1, maxLength: 120}
        summary: {type: string, maxLength: 5000}
        status: {$ref: "#/components/schemas/ChapterPlanStatus"}
        source: {$ref: "#/components/schemas/ChapterPlanSource"}
        storyline_refs_json:
          type: array
          minItems: 1
          items: {$ref: "#/components/schemas/ChapterPlanStorylineRef"}
        material_refs_json:
          type: array
          uniqueItems: true
          items: {type: string, format: uuid}
        foreshadowing_refs_json:
          type: array
          uniqueItems: true
          items: {type: string, format: uuid}
        chapter_goal: {type: [string, "null"], maxLength: 2000}
        creation_notes: {type: [string, "null"], maxLength: 2000}
        confirmed_at: {type: [string, "null"], format: date-time}
        version: {type: integer, minimum: 1}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
      description: confirmed_at is null exactly when status is pending_confirmation, and is a timestamp exactly when status is confirmed. chapter_no is unique per project across pending and confirmed plans.
    UpdateChapterPlanRequest:
      type: object
      additionalProperties: false
      required: [expected_version]
      minProperties: 2
      properties:
        expected_version: {type: integer, minimum: 1}
        chapter_no: {type: integer, minimum: 1}
        title: {type: string, minLength: 1, maxLength: 120}
        summary: {type: string, maxLength: 5000}
        storyline_refs_json:
          type: array
          minItems: 1
          items: {$ref: "#/components/schemas/ChapterPlanStorylineRef"}
        material_refs_json:
          type: array
          uniqueItems: true
          items: {type: string, format: uuid}
        foreshadowing_refs_json:
          type: array
          uniqueItems: true
          items: {type: string, format: uuid}
        chapter_goal: {type: [string, "null"], maxLength: 2000}
        creation_notes: {type: [string, "null"], maxLength: 2000}
      description: Omitting an editable field leaves it unchanged; supplying null for chapter_goal or creation_notes clears it, while supplying an empty string stores an empty value. Arrays replace the corresponding complete relation set; individual relation mutation and reordering APIs do not exist.
    MockGenerateChapterPlansRequest:
      type: object
      additionalProperties: false
      required: [target_storyline_id, start_chapter_no, end_chapter_no, chapter_count, include_main_storyline, include_child_storylines, include_project_materials, include_unpaid_foreshadowings, include_prior_chapter_summaries, summary_length, chapter_pace, generation_notes]
      properties:
        target_storyline_id: {type: string, format: uuid}
        start_chapter_no: {type: integer, minimum: 1}
        end_chapter_no: {type: integer, minimum: 1}
        chapter_count: {type: integer, minimum: 1, maximum: 20}
        include_main_storyline: {type: boolean}
        include_child_storylines: {type: boolean}
        include_project_materials: {type: boolean}
        include_unpaid_foreshadowings: {type: boolean}
        include_prior_chapter_summaries: {type: boolean}
        summary_length: {type: string, enum: [short, medium, long]}
        chapter_pace: {type: string, enum: [slow, balanced, fast]}
        generation_notes: {type: [string, "null"], maxLength: 2000}
      description: "target_storyline_id must belong to projectId. end_chapter_no must not precede start_chapter_no, and chapter_count must equal the inclusive chapter range size. generation_notes is nullable: omitted is invalid, null means no note, and an empty string is retained."
    MockGenerationRun:
      type: object
      additionalProperties: false
      required: [id, project_id, provider_key, workflow_key, status, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        project_id: {type: string, format: uuid}
        provider_key: {type: string, const: mock}
        workflow_key: {type: string, const: chapter_plan_mock_generate}
        status: {type: string, const: succeeded}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    MockGenerateChapterPlansResult:
      type: object
      additionalProperties: false
      required: [run, items]
      properties:
        run: {$ref: "#/components/schemas/MockGenerationRun"}
        items:
          type: array
          minItems: 1
          items: {$ref: "#/components/schemas/ChapterPlan"}
    ConfirmChapterPlanSelection:
      type: object
      additionalProperties: false
      required: [chapter_plan_id, expected_version]
      properties:
        chapter_plan_id: {type: string, format: uuid}
        expected_version: {type: integer, minimum: 1}
    ConfirmChapterPlansRequest:
      type: object
      additionalProperties: false
      required: [selections]
      properties:
        selections:
          type: array
          minItems: 1
          uniqueItems: true
          items: {$ref: "#/components/schemas/ConfirmChapterPlanSelection"}
      description: Each chapter_plan_id must be unique, belong to projectId, and be pending_confirmation unless this is an idempotent retry. The operation is all-or-nothing.
    ChapterPlanEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: {$ref: "#/components/schemas/ChapterPlan"}
        request_id: {type: string}
    ChapterPlanList:
      type: object
      additionalProperties: false
      required: [items, total, limit, offset]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/ChapterPlan"}}
        total: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 100}
        offset: {type: integer, minimum: 0}
    ChapterPlanListEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: {$ref: "#/components/schemas/ChapterPlanList"}
        request_id: {type: string}
    MockGenerateChapterPlansEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: {$ref: "#/components/schemas/MockGenerateChapterPlansResult"}
        request_id: {type: string}
