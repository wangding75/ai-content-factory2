    ForeshadowingStatus:
      type: string
      enum: [planned, planted, paid_off]
    ForeshadowingPriority:
      type: string
      enum: [low, medium, high]
    Foreshadowing:
      type: object
      additionalProperties: false
      required: [id, project_id, title, description, priority, planted_plot_line_id, payoff_plot_line_id, planned_plant_chapter, planned_payoff_chapter, status, version, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        project_id: {type: string, format: uuid}
        title: {type: string, minLength: 1, maxLength: 120}
        description: {type: string, maxLength: 5000}
        priority: {$ref: "#/components/schemas/ForeshadowingPriority"}
        planted_plot_line_id: {type: [string, "null"], format: uuid, description: "Storyline where the foreshadowing is planted."}
        payoff_plot_line_id: {type: [string, "null"], format: uuid, description: "Storyline planned to pay off the foreshadowing."}
        planned_plant_chapter: {type: [integer, "null"], minimum: 1}
        planned_payoff_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/ForeshadowingStatus"}
        version: {type: integer, minimum: 1}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
      description: planted_plot_line_id and payoff_plot_line_id are independently optional and may each be null or reference different storylines. Each non-null reference must exist and belong to project_id. When both chapter values are integers, planned_plant_chapter must not exceed planned_payoff_chapter.
    CreateForeshadowingRequest:
      type: object
      additionalProperties: false
      required: [title, description, priority, planted_plot_line_id, payoff_plot_line_id, planned_plant_chapter, planned_payoff_chapter, status]
      properties:
        title: {type: string, minLength: 1, maxLength: 120}
        description: {type: string, maxLength: 5000}
        priority: {$ref: "#/components/schemas/ForeshadowingPriority"}
        planted_plot_line_id: {type: [string, "null"], format: uuid}
        payoff_plot_line_id: {type: [string, "null"], format: uuid}
        planned_plant_chapter: {type: [integer, "null"], minimum: 1}
        planned_payoff_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/ForeshadowingStatus"}
      description: planted_plot_line_id and payoff_plot_line_id are independently optional. Each non-null ID must exist and belong to the path project; the two IDs may reference different storylines. When both chapter values are integers, planned_plant_chapter must not exceed planned_payoff_chapter.
    UpdateForeshadowingRequest:
      type: object
      additionalProperties: false
      required: [expected_version]
      minProperties: 2
      properties:
        expected_version: {type: integer, minimum: 1}
        title: {type: string, minLength: 1, maxLength: 120}
        description: {type: string, maxLength: 5000}
        priority: {$ref: "#/components/schemas/ForeshadowingPriority"}
        planted_plot_line_id: {type: [string, "null"], format: uuid}
        payoff_plot_line_id: {type: [string, "null"], format: uuid}
        planned_plant_chapter: {type: [integer, "null"], minimum: 1}
        planned_payoff_chapter: {type: [integer, "null"], minimum: 1}
        status: {$ref: "#/components/schemas/ForeshadowingStatus"}
      description: planted_plot_line_id and payoff_plot_line_id are independently optional. Each non-null ID must exist and remain in the foreshadowing project; the two IDs may reference different storylines. Status transitions are planned to planted and planted to paid_off only; an unchanged status is an idempotent update. When both chapter values are integers, planned_plant_chapter must not exceed planned_payoff_chapter.
    ForeshadowingList:
      type: object
      additionalProperties: false
      required: [items, total, limit, offset]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/Foreshadowing"}}
        total: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 100}
        offset: {type: integer, minimum: 0}
    ForeshadowingEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: {$ref: "#/components/schemas/Foreshadowing"}
        request_id: {type: string}
    ForeshadowingListEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data: {$ref: "#/components/schemas/ForeshadowingList"}
        request_id: {type: string}
