openapi: 3.1.0
info:
  title: AI Content Factory 2.0 API
  version: 0.5.0
  description: P0 API contract baseline.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: API is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /readyz:
    get:
      operationId: getReadiness
      responses:
        "200":
          description: API is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/meta:
    get:
      operationId: getApplicationMeta
      responses:
        "200":
          description: P0 capability metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/projects:
    get:
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/ProjectQuery"
        - $ref: "#/components/parameters/ProjectStatusQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/projects/{projectId}/workspace:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectWorkspace
      responses:
        "200":
          description: Project workspace read model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWorkspaceEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/projects/{projectId}/planning:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectPlanning
      description: |
        Retrieves a project's planning. Projects without a saved planning return 200
        with the empty planning state: empty content fields, an empty selling_points
        array, version 0, and null created_at and updated_at.
      responses:
        "200":
          description: Project planning, including the empty planning state when no planning has been saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPlanningEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: saveProjectPlanning
      description: |
        Completely replaces a project's planning using optimistic concurrency control.
        expected_version is 0 for the first save and the current version thereafter.
        A successful first save changes version from 0 to 1; a successful content change
        increments version. A version mismatch returns 409. Repeating an identical request
        when the server content already exactly matches returns the current result without
        incrementing version or producing another state change. No Idempotency-Key header is used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProjectPlanningRequest"
      responses:
        "200":
          description: Project planning saved, or the unchanged current result for an idempotent retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPlanningEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/materials:
    get:
      operationId: listMaterials
      description: |
        Lists global materials. q matches name, summary, and tags_json after trimming;
        an empty q is treated as omitted. q and type use AND semantics. Results use the
        requested sort with id ascending as a stable secondary sort. Defaults are
        sort=updated_at_desc, limit=20, and offset=0.
      parameters:
        - $ref: "#/components/parameters/MaterialQuery"
        - $ref: "#/components/parameters/MaterialTypeQuery"
        - $ref: "#/components/parameters/MaterialSortQuery"
        - $ref: "#/components/parameters/GlobalScopeQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Global material list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: createMaterial
      description: |
        Creates a global Material. Idempotency-Key is required and scoped to this operation.
        Replaying the same key with the same request returns the first created Material with
        status 201 without creating a duplicate. Reusing the same key with a different request
        returns 409 with IDEMPOTENCY_KEY_REUSED. Validation failures return 400 with VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialRequest"
      responses:
        "201":
          description: Global material created, or the original result returned for an idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/materials/{materialId}:
    parameters:
      - $ref: "#/components/parameters/MaterialId"
    get:
      operationId: getMaterial
      description: Invalid material IDs return 400 with INVALID_MATERIAL_ID; missing materials return 404 with MATERIAL_NOT_FOUND.
      responses:
        "200":
          description: Global material with its active project references.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialDetailEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMaterial
      description: |
        Partially updates only request fields other than expected_version. A version mismatch
        returns 409 with VERSION_CONFLICT. A successful content change increments version;
        an update whose supplied content already exactly matches the current material returns
        the current result without incrementing version. Material type is immutable. Invalid material IDs return 400 with INVALID_MATERIAL_ID; missing materials return 404 with MATERIAL_NOT_FOUND. Validation failures return 400 with VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaterialRequest"
      responses:
        "200":
          description: Updated global material, or the unchanged current result for an identical update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/projects/{projectId}/materials:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectMaterials
      description: |
        Lists active material bindings for a project. q matches material.name, material.summary,
        material.tags_json, usage.usage_type, usage.role_name, and usage.notes after trimming;
        an empty q is treated as omitted. type and q use AND semantics. Sorting uses item.last_updated_at
        and material.id ascending as the stable secondary sort. type_counts cover all active project
        bindings and are unaffected by q, type, limit, or offset. An existing project without materials
        returns 200 with an empty list and six zero counts. Invalid project IDs return INVALID_PROJECT_ID;
        missing projects return PROJECT_NOT_FOUND; validation failures return VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/ProjectMaterialQuery"
        - $ref: "#/components/parameters/MaterialTypeQuery"
        - $ref: "#/components/parameters/ProjectMaterialSortQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Active project material bindings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterialListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createProjectMaterial
      description: |
        Creates a global Material, its ProjectMaterialUsage, and the related AuditLog in one transaction.
        Any failure rolls back all three effects, so a Material cannot be left without its requested usage.
        Idempotency-Key is required and scoped only to createProjectMaterial: replaying the same key,
        projectId, and request returns the first result with 201 without duplicate records, version changes,
        or audit entries. Reusing a key with a different request returns 409 IDEMPOTENCY_KEY_REUSED.
        Invalid project IDs return INVALID_PROJECT_ID; missing projects return PROJECT_NOT_FOUND; invalid
        payloads return VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectMaterialRequest"
      responses:
        "201":
          description: Material and active project usage created, or the first result returned for an idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterialItemEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/projects/{projectId}/materials/{materialId}/binding:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MaterialId"
    post:
      operationId: bindProjectMaterial
      description: |
        Creates only an active ProjectMaterialUsage and its AuditLog in one transaction; it never creates,
        copies, or modifies the global Material. usage.version starts at 1. Only one active binding may
        exist for a project-material pair; a duplicate binding with a different idempotency key returns
        409 MATERIAL_ALREADY_BOUND. Idempotency-Key is required and scoped only to bindProjectMaterial:
        replaying the same key, path, and request returns the first result with 201, while reusing a key
        with a different request returns 409 IDEMPOTENCY_KEY_REUSED. Invalid IDs return INVALID_PROJECT_ID
        or INVALID_MATERIAL_ID; missing resources return PROJECT_NOT_FOUND or MATERIAL_NOT_FOUND; invalid
        payloads return VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMaterialUsageInput"
      responses:
        "201":
          description: Active project material usage created, or the first result returned for an idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterialItemEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: unbindProjectMaterial
      description: |
        Deletes only the ProjectMaterialUsage and its AuditLog in one transaction; the global Material is
        always retained and other project references are unaffected. expected_version applies when the
        active binding exists and mismatches return 409 VERSION_CONFLICT. If the project and Material exist
        but their binding is already absent, returns 200 with unbound=false. Repeated DELETE creates no
        additional state change or AuditLog. Invalid IDs return INVALID_PROJECT_ID or INVALID_MATERIAL_ID;
        missing resources return PROJECT_NOT_FOUND or MATERIAL_NOT_FOUND; invalid query values return VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/ExpectedUsageVersionQuery"
      responses:
        "200":
          description: Binding removal result; material_retained is always true.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnbindProjectMaterialResultEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/projects/{projectId}/materials/{materialId}/usage:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MaterialId"
    patch:
      operationId: updateProjectMaterialUsage
      description: |
        Updates only fields included in the request for this project's ProjectMaterialUsage; it never
        modifies the global Material. expected_version mismatches return 409 VERSION_CONFLICT. A real
        content change increments usage.version; an identical request returns the current result without
        incrementing version. The usage update and AuditLog are transactional. Invalid IDs return
        INVALID_PROJECT_ID or INVALID_MATERIAL_ID; absent bindings return MATERIAL_BINDING_NOT_FOUND;
        missing resources return PROJECT_NOT_FOUND or MATERIAL_NOT_FOUND; invalid payloads return VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectMaterialUsageRequest"
      responses:
        "200":
          description: Updated project material item, or the unchanged current result for an identical update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterialItemEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/projects/{projectId}/storylines:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectStorylines
      description: Project storyline forest. Nodes have recursively ordered children; roots are main storylines. Siblings sort by sort_order ascending, then id ascending. Invalid IDs return 400; missing projects return 404.
      responses:
        "200": {description: Project storyline forest., content: {application/json: {schema: {$ref: "#/components/schemas/PlotLineTreeEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
    post:
      operationId: createProjectStoryline
      description: Creates a root main storyline. Its parent_id is null, relation is root, and type is main. Invalid IDs or validation failures return 400; missing projects return 404.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateMainPlotLineRequest"}}}}
      responses:
        "201": {description: Root main storyline created., content: {application/json: {schema: {$ref: "#/components/schemas/PlotLineEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
  /api/v1/storylines/{storylineId}/children:
    parameters:
      - $ref: "#/components/parameters/StorylineId"
    post:
      operationId: createStorylineChild
      description: Creates a child storyline under the path parent. It inherits the parent's project_id, has relation child and type child. Invalid IDs or payloads return 400; a missing parent returns 404. The parent is not a request field, preventing cross-project parenting.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateChildPlotLineRequest"}}}}
      responses:
        "201": {description: Child storyline created., content: {application/json: {schema: {$ref: "#/components/schemas/PlotLineEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
  /api/v1/storylines/{storylineId}:
    parameters:
      - $ref: "#/components/parameters/StorylineId"
    patch:
      operationId: updateStoryline
      description: Updates only mutable fields. parent_id, relation, project_id, and type are immutable. expected_version is required; a mismatch returns 409 VERSION_CONFLICT. A real change increments version; an identical update returns the current storyline without another increment. Invalid IDs or payloads return 400; missing storylines return 404.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpdatePlotLineRequest"}}}}
      responses:
        "200": {description: Updated storyline., content: {application/json: {schema: {$ref: "#/components/schemas/PlotLineEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
  /api/v1/projects/{projectId}/foreshadowings:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectForeshadowings
      description: Lists a project's foreshadowings, ordered by priority descending, planned_plant_chapter ascending with nulls last, then id ascending. Invalid IDs or pagination values return 400; missing projects return 404.
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200": {description: Project foreshadowing list., content: {application/json: {schema: {$ref: "#/components/schemas/ForeshadowingListEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
    post:
      operationId: createProjectForeshadowing
      description: Creates a foreshadowing. planted_plot_line_id and payoff_plot_line_id are independently optional and may each be null or reference different storylines. Each non-null reference must exist and belong to the path project; a project mismatch is 400 PLOT_LINE_PROJECT_MISMATCH. Invalid IDs or payloads return 400; missing project or referenced storyline returns 404.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateForeshadowingRequest"}}}}
      responses:
        "201": {description: Foreshadowing created., content: {application/json: {schema: {$ref: "#/components/schemas/ForeshadowingEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
  /api/v1/foreshadowings/{foreshadowingId}:
    parameters:
      - $ref: "#/components/parameters/ForeshadowingId"
    patch:
      operationId: updateForeshadowing
      description: Updates supplied mutable fields and status. expected_version is required; a mismatch returns 409 VERSION_CONFLICT. planted_plot_line_id and payoff_plot_line_id are independently optional; each non-null supplied reference must exist and remain in the foreshadowing project or return 400 PLOT_LINE_PROJECT_MISMATCH. Status transitions are planned to planted and planted to paid_off only; an identical update, including an unchanged status, succeeds without incrementing version. Invalid IDs or payloads return 400; missing foreshadowings or references return 404.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpdateForeshadowingRequest"}}}}
      responses:
        "200": {description: Updated foreshadowing., content: {application/json: {schema: {$ref: "#/components/schemas/ForeshadowingEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
  /api/v1/projects/{projectId}/chapter-plans:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectChapterPlans
      description: Lists a project's chapter plans ordered by chapter_no ascending, then id ascending. Invalid IDs or pagination values return 400; missing projects return 404.
      parameters:
        - $ref: "#/components/parameters/ChapterPlanStatusQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200": {description: Chapter plan list., content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanListEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
  /api/v1/projects/{projectId}/chapter-plans/mock-generate:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: mockGenerateProjectChapterPlans
      description: Persists deterministic mock-generated pending_confirmation candidates and a MockGenerationRun. It never calls a real LLM or workflow. Existing candidates and confirmed plans are retained; a candidate whose chapter_no already exists returns 409 CHAPTER_NO_CONFLICT without partial persistence. On success, the C1 list includes the returned candidates.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/MockGenerateChapterPlansRequest"}}}}
      responses:
        "201": {description: Mock-generated chapter-plan candidates persisted., content: {application/json: {schema: {$ref: "#/components/schemas/MockGenerateChapterPlansEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
  /api/v1/chapter-plans/{chapterPlanId}:
    parameters:
      - $ref: "#/components/parameters/ChapterPlanId"
    get:
      operationId: getChapterPlan
      description: Gets one chapter plan. Invalid IDs return 400; a missing plan returns 404.
      responses:
        "200": {description: Chapter plan detail., content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
    patch:
      operationId: updateChapterPlan
      description: Updates supplied editable fields only while status is pending_confirmation. expected_version is required. A real change increments version; an identical update returns the current result without incrementing version. project_id, status, source, confirmed_at, and audit fields are immutable. Invalid IDs, references, or payloads return 400; missing plans or references return 404; a version mismatch or confirmed plan returns 409.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpdateChapterPlanRequest"}}}}
      responses:
        "200": {description: Updated chapter plan., content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
    delete:
      operationId: deleteChapterPlan
      description: Deletes one pending_confirmation candidate. expected_version is required as a query parameter. Confirmed plans cannot be deleted. Invalid IDs return 400; missing plans return 404; a version mismatch or confirmed plan returns 409.
      parameters:
        - $ref: "#/components/parameters/ExpectedChapterPlanVersionQuery"
      responses:
        "204": {description: Pending candidate deleted.}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
  /api/v1/projects/{projectId}/chapter-plans/confirm:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: confirmProjectChapterPlans
      description: >
        Atomically confirms the selected pending candidates. Each selected plan must belong to
        projectId, have a unique chapter_no, have a primary storyline reference, have valid
        foreshadowing chapter ranges, and not overlap an already confirmed chapter number.
        expected_version is required per selection. A retry of the same confirmation is idempotent:
        a now-confirmed immutable plan accepts the pre-confirmation expected_version or its current
        version and is returned unchanged. Confirmation is irreversible and never creates content
        or Iteration 06 data.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/ConfirmChapterPlansRequest"}}}}
      responses:
        "200": {description: "Selected chapter plans confirmed, or unchanged result for an idempotent retry.", content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanListEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
  /api/v1/chapter-plans/{chapterPlanId}/content:
    parameters: [{$ref: "#/components/parameters/ChapterPlanId"}]
    post:
      operationId: createContentItemForChapterPlan
      description: Creates the sole ContentItem and blank manual_created editable v1 for a confirmed ChapterPlan. A repeated call returns the existing item (200), never a duplicate.
      responses:
        "201": {description: Content item and v1 created., content: {application/json: {schema: {$ref: "#/components/schemas/ContentItemDetailEnvelope"}, example: {data: {content_item: {id: "11111111-1111-4111-8111-111111111111", chapter_plan_id: "22222222-2222-4222-8222-222222222222", title: "Chapter", status: draft, current_version_id: "33333333-3333-4333-8333-333333333333", reviewed_at: null, created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:00:00Z"}, current_version: {id: "33333333-3333-4333-8333-333333333333", content_item_id: "11111111-1111-4111-8111-111111111111", version_no: 1, version: 1, status: editable_draft, source: manual_created, title: "Chapter", content: "", summary: null, word_count: 0, frozen_at: null, created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:00:00Z"}}, request_id: req_01}}}}
        "200": {description: Existing ContentItem returned., content: {application/json: {schema: {$ref: "#/components/schemas/ContentItemDetailEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/content-items/{contentItemId}:
    parameters: [{$ref: "#/components/parameters/ContentItemId"}]
    get:
      operationId: getContentItem
      responses:
        "200": {description: ContentItem and current version., content: {application/json: {schema: {$ref: "#/components/schemas/ContentItemDetailEnvelope"}, example: {data: {content_item: {id: "11111111-1111-4111-8111-111111111111", chapter_plan_id: "22222222-2222-4222-8222-222222222222", title: "Chapter", status: draft, current_version_id: "33333333-3333-4333-8333-333333333333", reviewed_at: null, created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:00:00Z"}, current_version: {id: "33333333-3333-4333-8333-333333333333", content_item_id: "11111111-1111-4111-8111-111111111111", version_no: 1, version: 2, status: editable_draft, source: manual_created, title: "Chapter", content: "Text", summary: null, word_count: 1, frozen_at: null, created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:01:00Z"}}, request_id: req_02}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/content-items/{contentItemId}/draft:
    parameters: [{$ref: "#/components/parameters/ContentItemId"}]
    put:
      operationId: saveContentItemDraft
      description: Updates supplied draft fields only. expected_version is required. Omitted fields remain unchanged; summary null clears and an empty string is retained. A successful write increments version.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/SaveContentDraftRequest"}, example: {expected_version: 1, title: "Chapter", content: "Draft text", summary: null}}}}
      responses:
        "200": {description: Draft saved., content: {application/json: {schema: {$ref: "#/components/schemas/ContentItemDetailEnvelope"}, example: {data: {content_item: {id: "11111111-1111-4111-8111-111111111111", chapter_plan_id: "22222222-2222-4222-8222-222222222222", title: "Chapter", status: draft, current_version_id: "33333333-3333-4333-8333-333333333333", reviewed_at: null, created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:01:00Z"}, current_version: {id: "33333333-3333-4333-8333-333333333333", content_item_id: "11111111-1111-4111-8111-111111111111", version_no: 1, version: 2, status: editable_draft, source: manual_created, title: "Chapter", content: "Draft text", summary: null, word_count: 2, frozen_at: null, created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:01:00Z"}}, request_id: req_03}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/content-items/{contentItemId}/mock-generate:
    parameters: [{$ref: "#/components/parameters/ContentItemId"}, {$ref: "#/components/parameters/IdempotencyKey"}]
    post:
      operationId: mockGenerateContentItem
      description: Synchronous deterministic mock generation. It updates only the editable current v1. First valid execution creates one WorkflowRun; an identical idempotent retry returns exactly the prior result without another version increment or run. The complete operation is atomic.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/MockGenerateContentRequest"}, example: {expected_version: 2, parameters: {chapter_goal: "Obtain the pass", storyline_refs_json: ["66666666-6666-4666-8666-666666666666"], material_refs_json: [], foreshadowing_refs_json: [], creation_notes: null}}}}}
      responses:
        "200": {description: Generated draft and succeeded WorkflowRun., content: {application/json: {schema: {$ref: "#/components/schemas/MockGenerateContentResultEnvelope"}, example: {data: {content_item: {id: "11111111-1111-4111-8111-111111111111", chapter_plan_id: "22222222-2222-4222-8222-222222222222", title: "Chapter", status: draft, current_version_id: "33333333-3333-4333-8333-333333333333", reviewed_at: null, created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:02:00Z"}, current_version: {id: "33333333-3333-4333-8333-333333333333", content_item_id: "11111111-1111-4111-8111-111111111111", version_no: 1, version: 3, status: editable_draft, source: mock_generated, title: "Chapter", content: "Deterministic text", summary: null, word_count: 2, frozen_at: null, created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:02:00Z"}, workflow_run: {id: "44444444-4444-4444-8444-444444444444", provider_key: mock, workflow_key: content_mock_generate, status: succeeded, started_at: "2026-07-15T12:02:00Z", finished_at: "2026-07-15T12:02:00Z"}}, request_id: req_04}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/content-items/{contentItemId}/reviews/mock:
    parameters: [{$ref: "#/components/parameters/ContentItemId"}, {$ref: "#/components/parameters/IdempotencyKey"}]
    post:
      operationId: mockReviewContentItem
      description: Synchronous deterministic review of the specified current ContentVersion. Success atomically freezes the version, creates the report tree and a succeeded run, writes reviewed_at and returns reviewed; failure restores draft, creates no partial review tree and records a failed run. A new key for an already reviewed version returns content_version_already_reviewed.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/MockReviewRequest"}, example: {content_version_id: "33333333-3333-4333-8333-333333333333", expected_version: 3}}}}
      responses:
        "200": {description: Reviewed result; no returned business object remains running or in_review., content: {application/json: {schema: {$ref: "#/components/schemas/MockReviewResultEnvelope"}, example: {data: {content_item: {id: "11111111-1111-4111-8111-111111111111", chapter_plan_id: "22222222-2222-4222-8222-222222222222", title: "Chapter", status: reviewed, current_version_id: "33333333-3333-4333-8333-333333333333", reviewed_at: "2026-07-15T12:03:00Z", created_at: "2026-07-15T12:00:00Z", updated_at: "2026-07-15T12:03:00Z"}, review: {id: "55555555-5555-4555-8555-555555555555", content_item_id: "11111111-1111-4111-8111-111111111111", content_version_id: "33333333-3333-4333-8333-333333333333", provider_key: mock, status: completed, conclusion: revise, score: 70, summary: "Review", created_at: "2026-07-15T12:03:00Z"}, findings: [], recommendations: [], workflow_run: {id: "44444444-4444-4444-8444-444444444444", provider_key: mock, workflow_key: content_mock_review, status: succeeded, started_at: "2026-07-15T12:03:00Z", finished_at: "2026-07-15T12:03:00Z"}}, request_id: req_05}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/content-items/{contentItemId}/reviews:
    parameters: [{$ref: "#/components/parameters/ContentItemId"}, {$ref: "#/components/parameters/LimitQuery"}, {$ref: "#/components/parameters/OffsetQuery"}]
    get:
      operationId: listContentItemReviews
      description: Paginated review list in fixed stable order created_at DESC, id DESC. Invalid pagination returns invalid_pagination.
      responses:
        "200": {description: Review list., content: {application/json: {schema: {$ref: "#/components/schemas/ReviewListEnvelope"}, example: {data: {items: [], total: 0, limit: 20, offset: 0}, request_id: req_06}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/content-items/{contentItemId}/versions:
    parameters: [{$ref: "#/components/parameters/ContentItemId"}, {$ref: "#/components/parameters/LimitQuery"}, {$ref: "#/components/parameters/OffsetQuery"}]
    get:
      operationId: listContentItemVersions
      description: >
        Lists only versions belonging to the specified project-isolated ContentItem, including v1 and any 07.1A v2. Fixed order is version_no DESC, id DESC; id is the stable secondary key. is_current is true only when item.id equals ContentItem.current_version_id, never inferred from version_no or created_at. A v2 remains non-current unless current_version_id explicitly equals it. An existing item without versions returns 200 with an empty items array. limit and offset use the shared pagination semantics. Errors: 400 invalid_uuid or invalid_pagination; 404 content_item_not_found; 500 internal_error.
      responses:
        "200":
          description: Version list.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ContentVersionListEnvelope"}
              example: {data: {items: [], total: 0, limit: 20, offset: 0}, request_id: req_10}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/projects/{projectId}/works:
    parameters: [{$ref: "#/components/parameters/ProjectId"}, {$ref: "#/components/parameters/LimitQuery"}, {$ref: "#/components/parameters/OffsetQuery"}]
    get:
      operationId: listProjectWorks
      description: >
        Read-only ProjectWorkReadModel aggregation over existing Project, ChapterPlan, ContentItem, ContentVersion, ReviewReport, and WorkflowRun records. work_id is exactly the stable ContentItem.id; no Work entity, table, repository, or lifecycle exists. Fixed order is chapter_plan.chapter_no ASC, content_item.id ASC. current_version is selected only by ContentItem.current_version_id; version_count is the total versions for that ContentItem. latest_review uses created_at DESC, id DESC; latest_workflow_run uses started_at DESC, id DESC. An existing project with no works returns an empty list. Errors: 400 invalid_uuid or invalid_pagination; 404 project_not_found; 500 internal_error.
      responses:
        "200":
          description: Project works list.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ProjectWorkListEnvelope"}
              example: {data: {items: [], total: 0, limit: 20, offset: 0}, request_id: req_11}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/works:
    get:
      operationId: listGlobalWorks
      description: >
        Read-only cross-project GlobalWorkReadModel aggregation over the existing ProjectWorkReadModel.
        scope is fixed to global when supplied. work_id is exactly ContentItem.id; no Work entity,
        table, repository, or lifecycle exists. current_version is selected only by
        ContentItem.current_version_id. Fixed stable order is project.updated_at DESC,
        chapter_plan.chapter_no ASC, content_item.id ASC. Errors: 400 invalid_pagination or
        invalid_scope; 500 internal_error.
      parameters: [{$ref: "#/components/parameters/GlobalScopeQuery"}, {$ref: "#/components/parameters/LimitQuery"}, {$ref: "#/components/parameters/OffsetQuery"}]
      responses:
        "200": {description: Global works list., content: {application/json: {schema: {$ref: "#/components/schemas/GlobalWorkListEnvelope"}, example: {data: {items: [], total: 0, limit: 20, offset: 0}, request_id: req_08_works}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/works/{workId}:
    parameters: [{$ref: "#/components/parameters/WorkId"}]
    get:
      operationId: getProjectWork
      description: >
        Read-only ProjectWorkReadModel detail where workId is exactly ContentItem.id. It returns the aggregate for that ContentItem and never replaces current_version with a newer version. current_version is selected only by ContentItem.current_version_id; version history uses the frozen 07.1B summary semantics and order version_no DESC, id DESC. It includes navigation identifiers for D1, D2, D4, and D5 but no write behavior or ProjectWork persistence. Errors: 400 invalid_uuid; 404 work_not_found; 500 internal_error.
      responses:
        "200":
          description: Project work detail.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ProjectWorkDetailEnvelope"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/content-versions/{versionId}:
    parameters: [{$ref: "#/components/parameters/ContentVersionId"}]
    get:
      operationId: getContentVersion
      description: >
        Returns the requested project-isolated ContentVersion immutable snapshot, not a replacement selected through ContentItem.current_version_id. v1 returns v1 and v2 returns v2. is_current is derived only by comparing the returned version id with its ContentItem.current_version_id. Nullable source fields are null when no source exists; 07.1A v2 source relations match its rewrite WorkflowRun. No ProjectWork aggregate is returned. Errors: 400 invalid_uuid; 404 content_version_not_found; 500 internal_error.
      responses:
        "200":
          description: ContentVersion detail.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ContentVersionDetailEnvelope"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/content-items/{contentItemId}/rewrites/mock:
    parameters: [{$ref: "#/components/parameters/ContentItemId"}, {$ref: "#/components/parameters/IdempotencyKey"}]
    post:
      operationId: mockRewriteContentItem
      description: >
        Synchronous deterministic mock rewrite. The request must name the ContentItem's frozen v1 and its completed ReviewReport; expected_version must equal v1.version. Success atomically creates only editable v2 with source mock_rewrite and a succeeded content_mock_rewrite WorkflowRun. v1 remains frozen, ContentItem.current_version_id and item status do not change, and v2 has no ReviewReport or publication record. v3 and additional rewrites are rejected. The same operation-scoped Idempotency-Key and payload returns the original result; a changed payload returns idempotency_key_reused_with_different_payload. Failed execution retains only a failed WorkflowRun with safe error information and leaves no partial v2 or relation. Error codes: 400 invalid_uuid or idempotency_key_required; 404 content_item_not_found, content_version_not_found, or review_report_not_found; 409 content_version_not_frozen, review_not_completed, source_version_mismatch, version_conflict, idempotency_key_reused_with_different_payload, rewrite_already_exists, or cross_project_relation_conflict; 422 invalid_rewrite_parameters; 500 mock_rewrite_failed or internal_error.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/MockRewriteRequest"}, example: {source_content_version_id: "33333333-3333-4333-8333-333333333333", review_report_id: "55555555-5555-4555-8555-555555555555", expected_version: 3, parameters: {rewrite_focus: [pacing, foreshadowing], preserve_ending: true, instructions: null}}}}}
      responses:
        "201":
          description: Created v2 and succeeded WorkflowRun; v2 is not current.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/MockRewriteResultEnvelope"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/reviews/{reviewId}:
    parameters: [{$ref: "#/components/parameters/ReviewId"}]
    get:
      operationId: getReview
      description: Returns the completed ReviewReport, its immutable ContentVersion summary, Findings, Recommendations and WorkflowRun summary.
      responses:
        "200": {description: Review detail., content: {application/json: {schema: {$ref: "#/components/schemas/ReviewDetailEnvelope"}, example: {data: {review: {id: "55555555-5555-4555-8555-555555555555", content_item_id: "11111111-1111-4111-8111-111111111111", content_version_id: "33333333-3333-4333-8333-333333333333", provider_key: mock, status: completed, conclusion: revise, score: 70, summary: "Review", created_at: "2026-07-15T12:03:00Z"}, content_version: {id: "33333333-3333-4333-8333-333333333333", version_no: 1, version: 3, title: "Chapter", word_count: 2, source: mock_generated, frozen_at: "2026-07-15T12:03:00Z"}, findings: [], recommendations: [], workflow_run: {id: "44444444-4444-4444-8444-444444444444", provider_key: mock, workflow_key: content_mock_review, status: succeeded, started_at: "2026-07-15T12:03:00Z", finished_at: "2026-07-15T12:03:00Z"}}, request_id: req_07}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
        "422": {$ref: "#/components/responses/UnprocessableEntity"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/workflow-runs:
    get:
      operationId: listGlobalWorkflowRuns
      description: >
        Read-only global WorkflowRun projection for E3. It lists existing runs only and never starts,
        retries, edits, or orchestrates a run. Fixed stable order is started_at DESC, id DESC. project
        is null only when the historical subject cannot be resolved to a project; a result navigation is
        enabled only when project.id is present. error is a safe nullable user-facing summary and excludes
        SQL, credentials, stacks, infrastructure paths, and provider configuration. Errors: 400
        invalid_pagination; 500 internal_error.
      parameters: [{$ref: "#/components/parameters/LimitQuery"}, {$ref: "#/components/parameters/OffsetQuery"}]
      responses:
        "200": {description: Global workflow run list., content: {application/json: {schema: {$ref: "#/components/schemas/GlobalWorkflowRunListEnvelope"}, example: {data: {items: [], total: 0, limit: 20, offset: 0}, request_id: req_08_runs}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/workflows/builtin:
    get:
      operationId: listBuiltinWorkflows
      description: Frozen read-only descriptors for enabled built-in mock workflows. This endpoint neither exposes nor executes an editor, node graph, provider configuration, or external workflow.
      responses:
        "200": {description: Built-in workflow descriptors., content: {application/json: {schema: {$ref: "#/components/schemas/BuiltinWorkflowListEnvelope"}, example: {data: {items: []}, request_id: req_08_builtin}}}}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/capabilities:
    get:
      operationId: listCapabilities
      description: Frozen read-only capability status. mock_content is enabled; real_ai is not_configured. No key, provider, account, or configuration data is exposed.
      responses:
        "200": {description: Capability descriptors., content: {application/json: {schema: {$ref: "#/components/schemas/CapabilityListEnvelope"}, example: {data: {items: []}, request_id: req_08_capabilities}}}}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/integrations:
    get:
      operationId: listIntegrations
      description: Frozen read-only external integration status. All P0 integration descriptors are not_available and have no connect or configuration action.
      responses:
        "200": {description: Integration descriptors., content: {application/json: {schema: {$ref: "#/components/schemas/IntegrationListEnvelope"}, example: {data: {items: []}, request_id: req_08_integrations}}}}
        "500": {$ref: "#/components/responses/InternalServerError"}
  /api/v1/workflow-runs/{workflowRunId}:
    parameters: [{$ref: "#/components/parameters/WorkflowRunId"}]
    get:
      operationId: getWorkflowRun
      description: >
        Returns one project-isolated WorkflowRun. A rewrite run includes provider mock, workflow key content_mock_rewrite, source ContentItem/v1/ReviewReport, nullable target v2, summaries, safe error information, idempotency key, fingerprint, and lifecycle timestamps. A run is created for each new-key attempt and transitions running to succeeded or failed. Failed runs are retained with null target v2 and never expose SQL, connection strings, stacks, service paths, or repository details. Error codes: 400 invalid_uuid; 404 workflow_run_not_found; 500 internal_error.
      responses:
        "200":
          description: WorkflowRun detail.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/WorkflowRunDetailEnvelope"}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "500": {$ref: "#/components/responses/InternalServerError"}
components:
  parameters:
    ContentItemId:
      name: contentItemId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ContentVersionId:
      name: versionId
      in: path
      required: true
      schema: {type: string, format: uuid}
    WorkId:
      name: workId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ReviewId:
      name: reviewId
      in: path
      required: true
      schema: {type: string, format: uuid}
    WorkflowRunId:
      name: workflowRunId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ChapterPlanId:
      name: chapterPlanId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ChapterPlanStatusQuery:
      name: status
      in: query
      schema: {$ref: "#/components/schemas/ChapterPlanStatus"}
    ExpectedChapterPlanVersionQuery:
      name: expected_version
      in: query
      required: true
      schema: {type: integer, minimum: 1}
    StorylineId:
      name: storylineId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ForeshadowingId:
      name: foreshadowingId
      in: path
      required: true
      schema: {type: string, format: uuid}
    MaterialId:
      name: materialId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MaterialQuery:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
    MaterialTypeQuery:
      name: type
      in: query
      schema:
        $ref: "#/components/schemas/MaterialType"
    MaterialSortQuery:
      name: sort
      in: query
      schema:
        type: string
        enum: [updated_at_desc, updated_at_asc, name_asc, name_desc]
        default: updated_at_desc
    GlobalScopeQuery:
      name: scope
      in: query
      required: false
      description: Explicit alias for the global collection; the only accepted value is global.
      schema: {type: string, const: global}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    ProjectMaterialQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 120
    ProjectMaterialSortQuery:
      name: sort
      in: query
      required: false
      schema:
        type: string
        enum: [updated_at_desc, updated_at_asc, name_asc, name_desc]
        default: updated_at_desc
    ExpectedUsageVersionQuery:
      name: expected_version
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectQuery:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
    ProjectStatusQuery:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/ProjectStatus"
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequest:
      description: "Invalid request. Error codes include INVALID_PROJECT_ID and VALIDATION_ERROR."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: "Resource not found. Error code: PROJECT_NOT_FOUND."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: "Optimistic concurrency conflict. Error code: VERSION_CONFLICT."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnprocessableEntity:
      description: "Semantically invalid request. Error codes include invalid_generation_parameters and invalid_pagination."
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorEnvelope"}}}
    InternalServerError:
      description: "Unexpected safe server failure. Error bodies never include SQL, stack traces or implementation details."
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorEnvelope"}}}
  schemas:
    Envelope:
      type: object
      required: [data, request_id]
      properties:
        data: {}
        request_id:
          type: string
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error, request_id]
      properties:
        error:
