openapi: 3.1.0
info:
  title: AI Content Factory 2.0 API
  version: 0.2.0
  description: P0 API contract baseline.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: API is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /readyz:
    get:
      operationId: getReadiness
      responses:
        "200":
          description: API is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/meta:
    get:
      operationId: getApplicationMeta
      responses:
        "200":
          description: P0 capability metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/projects:
    get:
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/ProjectQuery"
        - $ref: "#/components/parameters/ProjectStatusQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/projects/{projectId}/workspace:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectWorkspace
      responses:
        "200":
          description: Project workspace read model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWorkspaceEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectQuery:
      name: q
      in: query
      schema:
        type: string
        maxLength: 120
    ProjectStatusQuery:
      name: status
      in: query
      schema:
        $ref: "#/components/schemas/ProjectStatus"
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Envelope:
      type: object
      required: [data, request_id]
      properties:
        data: {}
        request_id:
          type: string
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error, request_id]
      properties:
        error:
          $ref: "#/components/schemas/Error"
        request_id:
          type: string
    Error:
      type: object
      additionalProperties: false
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ProjectType:
      type: string
      enum: [novel]
    ProjectStatus:
      type: string
      enum: [planning, producing, archived]
    ProjectStage:
      type: string
      enum: [project_setup, project_planning, materials, storylines, chapter_planning, content_production, review, completed]
    Project:
      type: object
      additionalProperties: false
      required: [id, name, type, status, description, current_stage, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 120
        type:
          $ref: "#/components/schemas/ProjectType"
        status:
          $ref: "#/components/schemas/ProjectStatus"
        description:
          type: string
          maxLength: 5000
        current_stage:
          $ref: "#/components/schemas/ProjectStage"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        type:
          $ref: "#/components/schemas/ProjectType"
        description:
          type: string
          maxLength: 5000
          default: ""
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 5000
    ProjectList:
      type: object
      additionalProperties: false
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
    ProjectWorkspace:
      type: object
      additionalProperties: false
      required: [project, progress]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        progress:
          type: object
          additionalProperties: false
          required: [material_count, storyline_count, confirmed_chapter_count, work_count]
          properties:
            material_count:
              type: integer
              minimum: 0
            storyline_count:
              type: integer
              minimum: 0
            confirmed_chapter_count:
              type: integer
              minimum: 0
            work_count:
              type: integer
              minimum: 0
    ProjectEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data:
          $ref: "#/components/schemas/Project"
        request_id:
          type: string
    ProjectListEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data:
          $ref: "#/components/schemas/ProjectList"
        request_id:
          type: string
    ProjectWorkspaceEnvelope:
      type: object
      additionalProperties: false
      required: [data, request_id]
      properties:
        data:
          $ref: "#/components/schemas/ProjectWorkspace"
        request_id:
          type: string
