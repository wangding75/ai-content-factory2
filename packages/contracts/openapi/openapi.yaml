openapi: 3.1.0
info:
  title: AI Content Factory 2.0 API
  version: 0.5.0
  description: P0 API contract baseline.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: API is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /readyz:
    get:
      operationId: getReadiness
      responses:
        "200":
          description: API is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/meta:
    get:
      operationId: getApplicationMeta
      responses:
        "200":
          description: P0 capability metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/project-types:
    get:
      operationId: listProjectTypes
      description: Returns the supported project types in display order.
      responses:
        "200":
          description: Project type catalogue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTypeListEnvelope"
              example:
                data:
                  items:
                    - code: novel
                      name: 小说
                      description: 用于长篇小说、大纲与章节创作。
                      enabled: true
                      sort_order: 10
                    - code: short_film
                      name: 短片
                      description: 用于短片脚本与分镜创作。
                      enabled: true
                      sort_order: 20
                request_id: req_project_types_01
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/projects:
    get:
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/ProjectQuery"
        - $ref: "#/components/parameters/ProjectStatusQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/projects/{projectId}/workspace:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectWorkspace
      responses:
        "200":
          description: Project workspace read model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWorkspaceEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/projects/{projectId}/planning:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProjectPlanning
      description: |
        Retrieves a project's planning. Projects without a saved planning return 200
        with the empty planning state: empty content fields, an empty selling_points
        array, version 0, and null created_at and updated_at.
      responses:
        "200":
          description: Project planning, including the empty planning state when no planning has been saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPlanningEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: saveProjectPlanning
      description: |
        Completely replaces a project's planning using optimistic concurrency control.
        expected_version is 0 for the first save and the current version thereafter.
        A successful first save changes version from 0 to 1; a successful content change
        increments version. A version mismatch returns 409. Repeating an identical request
        when the server content already exactly matches returns the current result without
        incrementing version or producing another state change. No Idempotency-Key header is used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProjectPlanningRequest"
      responses:
        "200":
          description: Project planning saved, or the unchanged current result for an idempotent retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPlanningEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/materials:
    get:
      operationId: listMaterials
      description: |
        Lists global materials. q matches name, summary, and tags_json after trimming;
        an empty q is treated as omitted. q and type use AND semantics. Results use the
        requested sort with id ascending as a stable secondary sort. Defaults are
        sort=updated_at_desc, limit=20, and offset=0.
      parameters:
        - $ref: "#/components/parameters/MaterialQuery"
        - $ref: "#/components/parameters/MaterialTypeQuery"
        - $ref: "#/components/parameters/MaterialSortQuery"
        - $ref: "#/components/parameters/GlobalScopeQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Global material list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: createMaterial
      description: |
        Creates a global Material. Idempotency-Key is required and scoped to this operation.
        Replaying the same key with the same request returns the first created Material with
        status 201 without creating a duplicate. Reusing the same key with a different request
        returns 409 with IDEMPOTENCY_KEY_REUSED. Validation failures return 400 with VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialRequest"
      responses:
        "201":
          description: Global material created, or the original result returned for an idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/materials/{materialId}:
    parameters:
      - $ref: "#/components/parameters/MaterialId"
    get:
      operationId: getMaterial
      description: Invalid material IDs return 400 with INVALID_MATERIAL_ID; missing materials return 404 with MATERIAL_NOT_FOUND.
      responses:
        "200":
          description: Global material with its active project references.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialDetailEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMaterial
      description: |
        Partially updates only request fields other than expected_version. A version mismatch
        returns 409 with VERSION_CONFLICT. A successful content change increments version;
        an update whose supplied content already exactly matches the current material returns
        the current result without incrementing version. Material type is immutable. Invalid material IDs return 400 with INVALID_MATERIAL_ID; missing materials return 404 with MATERIAL_NOT_FOUND. Validation failures return 400 with VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaterialRequest"
      responses:
        "200":
          description: Updated global material, or the unchanged current result for an identical update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/projects/{projectId}/materials:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectMaterials
      description: |
        Lists active material bindings for a project. q matches material.name, material.summary,
        material.tags_json, usage.usage_type, usage.role_name, and usage.notes after trimming;
        an empty q is treated as omitted. type and q use AND semantics. Sorting uses item.last_updated_at
        and material.id ascending as the stable secondary sort. type_counts cover all active project
        bindings and are unaffected by q, type, limit, or offset. An existing project without materials
        returns 200 with an empty list and six zero counts. Invalid project IDs return INVALID_PROJECT_ID;
        missing projects return PROJECT_NOT_FOUND; validation failures return VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/ProjectMaterialQuery"
        - $ref: "#/components/parameters/MaterialTypeQuery"
        - $ref: "#/components/parameters/ProjectMaterialSortQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200":
          description: Active project material bindings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterialListEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createProjectMaterial
      description: |
        Creates a global Material, its ProjectMaterialUsage, and the related AuditLog in one transaction.
        Any failure rolls back all three effects, so a Material cannot be left without its requested usage.
        Idempotency-Key is required and scoped only to createProjectMaterial: replaying the same key,
        projectId, and request returns the first result with 201 without duplicate records, version changes,
        or audit entries. Reusing a key with a different request returns 409 IDEMPOTENCY_KEY_REUSED.
        Invalid project IDs return INVALID_PROJECT_ID; missing projects return PROJECT_NOT_FOUND; invalid
        payloads return VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectMaterialRequest"
      responses:
        "201":
          description: Material and active project usage created, or the first result returned for an idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterialItemEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/projects/{projectId}/materials/{materialId}/binding:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MaterialId"
    post:
      operationId: bindProjectMaterial
      description: |
        Creates only an active ProjectMaterialUsage and its AuditLog in one transaction; it never creates,
        copies, or modifies the global Material. usage.version starts at 1. Only one active binding may
        exist for a project-material pair; a duplicate binding with a different idempotency key returns
        409 MATERIAL_ALREADY_BOUND. Idempotency-Key is required and scoped only to bindProjectMaterial:
        replaying the same key, path, and request returns the first result with 201, while reusing a key
        with a different request returns 409 IDEMPOTENCY_KEY_REUSED. Invalid IDs return INVALID_PROJECT_ID
        or INVALID_MATERIAL_ID; missing resources return PROJECT_NOT_FOUND or MATERIAL_NOT_FOUND; invalid
        payloads return VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMaterialUsageInput"
      responses:
        "201":
          description: Active project material usage created, or the first result returned for an idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterialItemEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: unbindProjectMaterial
      description: |
        Deletes only the ProjectMaterialUsage and its AuditLog in one transaction; the global Material is
        always retained and other project references are unaffected. expected_version applies when the
        active binding exists and mismatches return 409 VERSION_CONFLICT. If the project and Material exist
        but their binding is already absent, returns 200 with unbound=false. Repeated DELETE creates no
        additional state change or AuditLog. Invalid IDs return INVALID_PROJECT_ID or INVALID_MATERIAL_ID;
        missing resources return PROJECT_NOT_FOUND or MATERIAL_NOT_FOUND; invalid query values return VALIDATION_ERROR.
      parameters:
        - $ref: "#/components/parameters/ExpectedUsageVersionQuery"
      responses:
        "200":
          description: Binding removal result; material_retained is always true.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnbindProjectMaterialResultEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/projects/{projectId}/materials/{materialId}/usage:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MaterialId"
    patch:
      operationId: updateProjectMaterialUsage
      description: |
        Updates only fields included in the request for this project's ProjectMaterialUsage; it never
        modifies the global Material. expected_version mismatches return 409 VERSION_CONFLICT. A real
        content change increments usage.version; an identical request returns the current result without
        incrementing version. The usage update and AuditLog are transactional. Invalid IDs return
        INVALID_PROJECT_ID or INVALID_MATERIAL_ID; absent bindings return MATERIAL_BINDING_NOT_FOUND;
        missing resources return PROJECT_NOT_FOUND or MATERIAL_NOT_FOUND; invalid payloads return VALIDATION_ERROR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectMaterialUsageRequest"
      responses:
        "200":
          description: Updated project material item, or the unchanged current result for an identical update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMaterialItemEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/projects/{projectId}/storylines:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectStorylines
      description: Project storyline forest. Nodes have recursively ordered children; roots are main storylines. Siblings sort by sort_order ascending, then id ascending. Invalid IDs return 400; missing projects return 404.
      responses:
        "200": {description: Project storyline forest., content: {application/json: {schema: {$ref: "#/components/schemas/PlotLineTreeEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
    post:
      operationId: createProjectStoryline
      description: Creates a root main storyline. Its parent_id is null, relation is root, and type is main. Invalid IDs or validation failures return 400; missing projects return 404.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateMainPlotLineRequest"}}}}
      responses:
        "201": {description: Root main storyline created., content: {application/json: {schema: {$ref: "#/components/schemas/PlotLineEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
  /api/v1/storylines/{storylineId}/children:
    parameters:
      - $ref: "#/components/parameters/StorylineId"
    post:
      operationId: createStorylineChild
      description: Creates a child storyline under the path parent. It inherits the parent's project_id, has relation child and type child. Invalid IDs or payloads return 400; a missing parent returns 404. The parent is not a request field, preventing cross-project parenting.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateChildPlotLineRequest"}}}}
      responses:
        "201": {description: Child storyline created., content: {application/json: {schema: {$ref: "#/components/schemas/PlotLineEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
  /api/v1/storylines/{storylineId}:
    parameters:
      - $ref: "#/components/parameters/StorylineId"
    patch:
      operationId: updateStoryline
      description: Updates only mutable fields. parent_id, relation, project_id, and type are immutable. expected_version is required; a mismatch returns 409 VERSION_CONFLICT. A real change increments version; an identical update returns the current storyline without another increment. Invalid IDs or payloads return 400; missing storylines return 404.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpdatePlotLineRequest"}}}}
      responses:
        "200": {description: Updated storyline., content: {application/json: {schema: {$ref: "#/components/schemas/PlotLineEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
  /api/v1/projects/{projectId}/foreshadowings:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectForeshadowings
      description: Lists a project's foreshadowings, ordered by priority descending, planned_plant_chapter ascending with nulls last, then id ascending. Invalid IDs or pagination values return 400; missing projects return 404.
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200": {description: Project foreshadowing list., content: {application/json: {schema: {$ref: "#/components/schemas/ForeshadowingListEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
    post:
      operationId: createProjectForeshadowing
      description: Creates a foreshadowing. planted_plot_line_id and payoff_plot_line_id are independently optional and may each be null or reference different storylines. Each non-null reference must exist and belong to the path project; a project mismatch is 400 PLOT_LINE_PROJECT_MISMATCH. Invalid IDs or payloads return 400; missing project or referenced storyline returns 404.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateForeshadowingRequest"}}}}
      responses:
        "201": {description: Foreshadowing created., content: {application/json: {schema: {$ref: "#/components/schemas/ForeshadowingEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
  /api/v1/foreshadowings/{foreshadowingId}:
    parameters:
      - $ref: "#/components/parameters/ForeshadowingId"
    patch:
      operationId: updateForeshadowing
      description: Updates supplied mutable fields and status. expected_version is required; a mismatch returns 409 VERSION_CONFLICT. planted_plot_line_id and payoff_plot_line_id are independently optional; each non-null supplied reference must exist and remain in the foreshadowing project or return 400 PLOT_LINE_PROJECT_MISMATCH. Status transitions are planned to planted and planted to paid_off only; an identical update, including an unchanged status, succeeds without incrementing version. Invalid IDs or payloads return 400; missing foreshadowings or references return 404.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpdateForeshadowingRequest"}}}}
      responses:
        "200": {description: Updated foreshadowing., content: {application/json: {schema: {$ref: "#/components/schemas/ForeshadowingEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
  /api/v1/projects/{projectId}/chapter-plans:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectChapterPlans
      description: Lists a project's chapter plans ordered by chapter_no ascending, then id ascending. Invalid IDs or pagination values return 400; missing projects return 404.
      parameters:
        - $ref: "#/components/parameters/ChapterPlanStatusQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/OffsetQuery"
      responses:
        "200": {description: Chapter plan list., content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanListEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
  /api/v1/projects/{projectId}/chapter-plans/mock-generate:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: mockGenerateProjectChapterPlans
      description: Persists deterministic mock-generated pending_confirmation candidates and a MockGenerationRun. It never calls a real LLM or workflow. Existing candidates and confirmed plans are retained; a candidate whose chapter_no already exists returns 409 CHAPTER_NO_CONFLICT without partial persistence. On success, the C1 list includes the returned candidates.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/MockGenerateChapterPlansRequest"}}}}
      responses:
        "201": {description: Mock-generated chapter-plan candidates persisted., content: {application/json: {schema: {$ref: "#/components/schemas/MockGenerateChapterPlansEnvelope"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "404": {$ref: "#/components/responses/NotFound"}
        "409": {$ref: "#/components/responses/Conflict"}
  /api/v1/projects/{projectId}/chapter-plan-runs/preflight:
    parameters: [{$ref: "#/components/parameters/ProjectId"}]
    post:
      operationId: preflightChapterPlanRun
      description: Read-only chapter-planning preflight. It creates no Run, Batch, Candidate, ChapterPlan or external execution. A pass token is actor/project/input-bound and expires after 10 minutes.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningPreflightRequest"}}}}
      responses: {"200": {description: "Preflight report. blocked is a normal business result, not an ErrorEnvelope.", content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningPreflightEnvelope"}}}}, "400": {$ref: "#/components/responses/BadRequest"}, "404": {$ref: "#/components/responses/NotFound"}, "409": {description: "Active chapter-planning run conflict.", content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningPreflightConflictErrorEnvelope"}, examples: {activeRunConflict: {$ref: "#/components/examples/ChapterPlanningActiveRunConflictError"}}}}}, "422": {description: "Protocol-level preflight failure; ordinary blockers remain a 200 blocked report.", content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningWorkflowNotConfiguredErrorEnvelope"}}}}}
  /api/v1/projects/{projectId}/chapter-plan-runs:
    parameters: [{$ref: "#/components/parameters/ProjectId"}, {$ref: "#/components/parameters/IdempotencyKey"}]
    post:
      operationId: createChapterPlanRun
      description: Validates the preflight token, builds the safe input and delegates to the Iteration 14 Runtime. stage=chapter_planning and triggerSource=manual are server-managed; clients must not call generic createWorkflowRun for this action.
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CreateChapterPlanRunRequest"}}}}
      responses: {"201": {description: "Queued Runtime WorkflowRun.", content: {application/json: {schema: {$ref: "#/components/schemas/Iteration14WorkflowRunEnvelope"}}}}, "400": {$ref: "#/components/responses/BadRequest"}, "404": {$ref: "#/components/responses/NotFound"}, "409": {description: "Input drift, active run, consumed run, or idempotency conflict.", content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningCreateRunConflictErrorEnvelope"}}}}, "422": {description: "Invalid, expired, or unavailable preflight prerequisite.", content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningCreateRunPreconditionErrorEnvelope"}, examples: {preflightTokenExpired: {$ref: "#/components/examples/ChapterPlanningPreflightTokenExpiredError"}}}}}}
  /api/v1/projects/{projectId}/chapter-planning-summary:
    parameters: [{$ref: "#/components/parameters/ProjectId"}]
    get:
      operationId: getProjectChapterPlanningSummary
      description: Read-only workspace aggregation, including the current active chapter_planning Runtime run when present.
      responses: {"200": {description: Chapter planning summary., content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningSummaryEnvelope"}}}}, "400": {$ref: "#/components/responses/BadRequest"}, "404": {$ref: "#/components/responses/NotFound"}, "422": {description: Latest Run output failed normalized-output validation., content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningOutputValidationErrorEnvelope"}, examples: {outputValidationFailed: {$ref: "#/components/examples/ChapterPlanningOutputValidationFailedError"}}}}}, "500": {description: Latest Run result consumption failed safely., content: {application/json: {schema: {$ref: "#/components/schemas/ChapterPlanningResultConsumptionErrorEnvelope"}}}}}
  /api/v1/projects/{projectId}/chapter-plan-candidate-batches:
    parameters: [{$ref: "#/components/parameters/ProjectId"}]
    get:
      operationId: listChapterPlanCandidateBatches
