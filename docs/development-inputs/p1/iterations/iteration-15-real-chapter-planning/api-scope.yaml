iteration: iteration-15-real-chapter-planning
status: frozen_cf_15_01c
contract_source_after_freeze: packages/contracts/openapi/openapi.yaml

principles:
  - Preflight is side-effect free and never creates a WorkflowRun.
  - Chapter-planning run creation delegates to the Iteration 14 WorkflowRun application service.
  - stage and manual triggerSource are server-managed.
  - Generated output creates a candidate batch and never directly overwrites current ChapterPlan records.
  - Candidate adoption creates or replaces current chapters as pending_confirmation.
  - Confirmation continues to use the P0 ChapterPlan confirmation API.
  - All mutable writes use optimistic locking and a required Idempotency-Key with persistent replay semantics.
  - Errors use the shared ErrorEnvelope with request_id.
  - Secrets, raw upstream responses, raw idempotency keys, SQL and stack traces are never returned.
  - Candidate statuses are pending, stale, adopted and discarded; edited is not a status.
  - A stale candidate has no force-overwrite path.
  - Bulk adoption uses one transaction per candidate and returns an itemized result.
  - WorkflowRun succeeded and candidate-result consumption succeeded are independent outcomes.

planned_endpoints:
  - operation: preflightChapterPlanRun
    method: POST
    path: /api/v1/projects/{projectId}/chapter-plan-runs/preflight
    side_effect: none
    request:
      - generationMode
      - target
      - storylineSelection
      - contextOptions
      - additionalInstructions
    response:
      - preflightToken
      - expiresAt
      - inputSummary
      - executionConfigurationSummary
      - checks
      - blockers
      - warnings

  - operation: createChapterPlanRun
    method: POST
    path: /api/v1/projects/{projectId}/chapter-plan-runs
    headers:
      - Idempotency-Key
    request:
      - preflightToken
    server_managed:
      stage: chapter_planning
      triggerSource: manual
    response:
      - workflowRun

  - operation: listChapterPlanCandidateBatches
    method: GET
    path: /api/v1/projects/{projectId}/chapter-plan-candidate-batches
    filters:
      - status
      - generationMode
      - sourceWorkflowRunId
      - createdAtFrom
      - createdAtTo
      - limit
      - offset

  - operation: getChapterPlanCandidateBatch
    method: GET
    path: /api/v1/chapter-plan-candidate-batches/{batchId}

  - operation: listChapterPlanCandidates
    method: GET
    path: /api/v1/chapter-plan-candidate-batches/{batchId}/candidates
    filters:
      - status
      - diffType
      - storylineId
      - q
      - limit
      - offset

  - operation: getChapterPlanCandidate
    method: GET
    path: /api/v1/chapter-plan-candidates/{candidateId}

  - operation: updateChapterPlanCandidate
    method: PATCH
    path: /api/v1/chapter-plan-candidates/{candidateId}
    request:
      - expectedCandidateVersion
      - currentSnapshot
    headers:
      - Idempotency-Key

  - operation: recompareChapterPlanCandidate
    method: POST
    path: /api/v1/chapter-plan-candidates/{candidateId}/recompare
    request:
      - expectedCandidateVersion
    headers:
      - Idempotency-Key
    response:
      - currentChapter
      - candidate
      - diff
      - conflict

  - operation: adoptChapterPlanCandidate
    method: POST
    path: /api/v1/chapter-plan-candidates/{candidateId}/adopt
    headers:
      - Idempotency-Key
    request:
      - expectedCandidateVersion
      - expectedChapterPlanVersion
    response:
      - candidate
      - chapterPlan
      - revision
      - batchSummary

  - operation: discardChapterPlanCandidate
    method: POST
    path: /api/v1/chapter-plan-candidates/{candidateId}/discard
    headers:
      - Idempotency-Key
    request:
      - expectedCandidateVersion
      - reason

  - operation: adoptChapterPlanCandidates
    method: POST
    path: /api/v1/chapter-plan-candidate-batches/{batchId}/adoptions
    headers:
      - Idempotency-Key
    request:
      - expectedBatchVersion
      - candidates
    response:
      - adopted
      - skippedNoChange
      - conflicts
      - failures
      - batchSummary

  - operation: abandonChapterPlanCandidateBatch
    method: POST
    path: /api/v1/chapter-plan-candidate-batches/{batchId}/abandon
    headers:
      - Idempotency-Key
    request:
      - expectedVersion
      - reason
      - acknowledgeAdoptedChaptersRemain
    response:
      - batchSummary

  - operation: getProjectChapterPlanningSummary
    method: GET
    path: /api/v1/projects/{projectId}/chapter-planning-summary

reused_endpoints:
  - GET /api/v1/projects/{projectId}/chapter-plans
  - GET /api/v1/chapter-plans/{chapterPlanId}
  - PATCH /api/v1/chapter-plans/{chapterPlanId}
  - DELETE /api/v1/chapter-plans/{chapterPlanId}
  - POST /api/v1/projects/{projectId}/chapter-plans/confirm
  - GET /api/v1/workflow-runs
  - GET /api/v1/workflow-runs/{runId}
  - GET /api/v1/workflow-runs/{runId}/events
  - POST /api/v1/workflow-runs/{runId}/cancel
  - POST /api/v1/workflow-runs/{runId}/retries

internal_application_contract:
  name: ChapterPlanResultIngestor
  input:
    - workflowRunId
    - normalizedChapterPlanningOutput
  normalized_output_schema:
    file: packages/contracts/content-packs/novel/chapter-planning-output.schema.json
    id: https://ai-content-factory.local/schemas/content-packs/novel/chapter-planning-output.schema.json
    draft: "2020-12"
  guarantees:
    - validates the complete output before persistence
    - creates at most one batch per workflowRunId
    - writes the batch and all candidates atomically
    - never exposes provider-specific payloads to the web API

decisions_to_freeze:
  - Complete OpenAPI field schemas and error codes are frozen in packages/contracts/openapi/openapi.yaml.
  - Token implementation is the CF-15-01B stateless signed-token design; no preflight persistence.
  - Runtime list/detail/event/cancel/retry reuse Iteration 14 routes without aliases.
  - All CF-15 write commands persist Idempotency-Key replay semantics; expected versions are Candidate, Batch or ChapterPlan-specific.
  - Preflight blocker codes are project_binding_missing, execution_integration_unavailable, active_run_conflict, storyline_reference_invalid and generation_input_invalid.

error_contracts:
  details: [resourceId, expectedVersion, currentVersion, retryAction, safeReason]
  codes:
    workflow_not_configured: {http: 422, operations: [preflightChapterPlanRun, createChapterPlanRun]}
    preflight_token_invalid: {http: 422, operations: [createChapterPlanRun]}
    preflight_token_expired: {http: 422, operations: [createChapterPlanRun]}
    preflight_input_changed: {http: 409, operations: [createChapterPlanRun]}
    active_run_conflict: {http: 409, operations: [preflightChapterPlanRun, createChapterPlanRun]}
    invalid_candidate_state: {http: 409, operations: [updateChapterPlanCandidate, recompareChapterPlanCandidate, adoptChapterPlanCandidate, discardChapterPlanCandidate, adoptChapterPlanCandidates, abandonChapterPlanCandidateBatch]}
    stale_candidate: {http: 409, operations: [adoptChapterPlanCandidate, adoptChapterPlanCandidates]}
    version_conflict: {http: 409, operations: [updateChapterPlanCandidate, recompareChapterPlanCandidate, adoptChapterPlanCandidate, discardChapterPlanCandidate, adoptChapterPlanCandidates, abandonChapterPlanCandidateBatch]}
    batch_already_finalized: {http: 409, operations: [adoptChapterPlanCandidates, abandonChapterPlanCandidateBatch]}
    run_already_consumed: {http: 409, operations: [createChapterPlanRun]}
    chapter_no_conflict: {http: 409, operations: [adoptChapterPlanCandidate, adoptChapterPlanCandidates]}
    revision_sequence_conflict: {http: 409, operations: [adoptChapterPlanCandidate, adoptChapterPlanCandidates]}
    output_validation_failed: {http: 422, operations: [getWorkflowRunDetail]}
    result_consumption_failed: {http: 500, operations: [getWorkflowRunDetail]}
    idempotency_key_reused_with_different_payload: {http: 409, operations: [createChapterPlanRun, updateChapterPlanCandidate, recompareChapterPlanCandidate, adoptChapterPlanCandidate, discardChapterPlanCandidate, adoptChapterPlanCandidates, abandonChapterPlanCandidateBatch]}
