iteration: iteration-13-project-workflow-bindings
status: draft_for_contract_freeze

stages:
  - chapter_planning
  - content_generation
  - review
  - rewrite

apis:
  - operation: list_project_workflow_bindings
    method: GET
    path: /projects/{projectId}/workflow-bindings
    purpose: return the four fixed stages with current binding and read-only global workflow status

  - operation: put_project_workflow_binding
    method: PUT
    path: /projects/{projectId}/workflow-bindings/{stage}
    purpose: create or replace one project-stage binding
    requirements:
      - Idempotency-Key
      - workflowConfigurationId
      - applicableStages must include stage
      - disabled workflows cannot be newly selected
    concurrency:
      - create requires no existing binding for projectId and stage
      - replace requires expectedVersion matching the current binding
      - an existing binding with missing or stale expectedVersion returns 409

  - operation: delete_project_workflow_binding
    method: DELETE
    path: /projects/{projectId}/workflow-bindings/{stage}
    purpose: remove one project-stage binding without deleting the global workflow
    requirements:
      - Idempotency-Key
      - expectedVersion

reused_apis:
  - operation: list_global_workflow_configurations
    purpose: list candidate global workflow configurations
    source: Iteration 12 global workflow configuration list API
    iteration_13_contract_extension:
      - add optional applicableStage query filter
    query_parameters:
      - q
      - applicableStage
      - limit
      - offset
      - enabled (optional; the binding selector does not force enabled=true because disabled workflows remain visible but non-selectable)
    selection_rules:
      - applicableStages must include the requested stage
      - disabled workflows may be returned for status visibility but cannot be selected
      - the binding command rechecks applicability and enabled state transactionally

common_requirements:
  - OpenAPI is the single contract source
  - errors use the shared error envelope
  - optimistic locking is required for replace and remove
  - duplicate idempotent requests do not create duplicate bindings or Audit events
  - project authorization and cross-project isolation are mandatory
  - no secrets, credentials, raw upstream responses, or complete sensitive URLs are returned
  - all business writes and idempotency records use one transaction
  - no third-party outbound request is allowed in this iteration

out_of_scope:
  - validate workflow
  - enable or disable workflow
  - execute workflow
  - WorkflowRun
  - retries and execution logs
  - project-level default parameter overrides
