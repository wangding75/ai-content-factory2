iteration: iteration-14-workflow-run-runtime
title: n8n Adapter and WorkflowRun Runtime
status: frozen_cf_14_01

apis:
  workflow_connections:
    - method: POST
      path: /api/v1/workflow-connections/{connectionId}/verify
      purpose: Verify a saved n8n connection through the adapter.
    - method: POST
      path: /api/v1/workflow-connections/{connectionId}/enable
      purpose: Enable a verified connection and atomically disable the existing enabled connection.
    - method: POST
      path: /api/v1/workflow-connections/{connectionId}/disable
      purpose: Disable a connection.
  workflow_configurations:
    - method: POST
      path: /api/v1/workflow-configurations/{workflowConfigurationId}/verify
      purpose: Verify the Workflow ID or Webhook Path through its bound connection.
    - method: POST
      path: /api/v1/workflow-configurations/{workflowConfigurationId}/enable
      purpose: Enable a verified workflow configuration with a verified enabled connection.
    - method: POST
      path: /api/v1/workflow-configurations/{workflowConfigurationId}/disable
      purpose: Disable a workflow configuration.
  workflow_runs:
    - method: POST
      path: /api/v1/workflow-runs
      purpose: Create an idempotent queued run from a project stage binding; creation returns the new run for direct detail navigation.
    - method: GET
      path: /api/v1/workflow-runs
      purpose: List global runs or project/stage-filtered runs using one shared endpoint.
    - method: GET
      path: /api/v1/workflow-runs/{runId}
      purpose: Read one run with safe binding/configuration snapshot and redacted errors.
    - method: GET
      path: /api/v1/workflow-runs/{runId}/events
      purpose: Read the ordered safe event timeline.
    - method: POST
      path: /api/v1/workflow-runs/{runId}/retries
      purpose: Create a new full retry run while preserving the original run.
    - method: POST
      path: /api/v1/workflow-runs/{runId}/cancel
      purpose: Request cancellation for a cancellable queued or running run.
  project_workflow_run_summary:
    - method: GET
      path: /api/v1/projects/{projectId}/workflow-run-summary
      purpose: Return the project run query aggregation used by the project overview.

list_query:
  supported: [projectId, stage, workflowConfigurationId, status, triggerSource, runNumber, q, startTime, endTime, limit, offset]
  rules:
    - q and runNumber search the displayed run number.
    - project-side filtering and the global list use GET /api/v1/workflow-runs; no duplicate project run-list endpoint is added.

common_requirements:
  - Create WorkflowRun uses Idempotency-Key and has no expectedVersion; Cancel and Retry expectedVersion target the path runId WorkflowRun.version; connection/configuration commands target their path resource version.
  - Errors use the shared redacted ErrorEnvelope: error.code, error.message, error.details, request_id.
  - Verification errors, execution errors, snapshots and upstream responses are redacted; secrets are never returned.
  - WorkflowRun stores immutable binding and configuration snapshots without keys.
  - Worker execution is asynchronous and follows the frozen state machine.
  - n8n is invoked through webhook HTTP response; no callback server is built.
  - CF-14-01 will place the final interfaces in the authoritative OpenAPI.

workflow_run_semantics:
  trigger_sources: [manual, retry, system, api]
  retry: "failed/cancelled only; defaults to the source snapshot/input; useCurrentConfiguration resolves current runnable binding/configuration/connection; inputOverride fully replaces input."
  list_time_range: "startTime/endTime are inclusive RFC 3339 bounds on createdAt."
  list_search: "runNumber is exact; q is case-insensitive contains on runNumber; both combine with AND."
  summary: "totalRuns all; activeRuns queued+running; recentFailedRuns failed created in last 7x24h; lastRunAt latest createdAt; recentRuns <=3 by createdAt DESC,id DESC."
  event_status: "Required WorkflowRun five-state snapshot after event write; not an event lifecycle."
  idempotency: "Use shared operationId plus target-resource scope and stable payload hash; create target is projectId+stage, cancel/retry target is runId."

not_in_scope:
  - Distribution-platform binding or execution
  - LLM Provider validation, discovery or invocation
  - OAuth, publishing and other adapters
  - Callback server
