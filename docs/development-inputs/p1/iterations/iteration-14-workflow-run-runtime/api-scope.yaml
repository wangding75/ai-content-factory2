iteration: iteration-14-workflow-run-runtime
title: WorkflowRun Runtime 与执行器抽象
status: frozen_cf_14_01_r2

runtime:
  owner: apps/api/internal/workflowrun
  tables: [workflow_run_records, workflow_run_events]
  dto_style: camelCase
  routes:
    - [POST, /api/v1/workflow-runs]
    - [GET, /api/v1/workflow-runs]
    - [GET, /api/v1/workflow-runs/{runId}]
    - [GET, /api/v1/workflow-runs/{runId}/events]
    - [POST, /api/v1/workflow-runs/{runId}/retries]
    - [POST, /api/v1/workflow-runs/{runId}/cancel]
    - [GET, /api/v1/projects/{projectId}/workflow-run-summary]
  trigger_sources: [manual, retry, system, api]
  execution: UnavailableWorkflowExecutor creates queued records and initial events only; FakeWorkflowExecutor is test-only.

legacy_content:
  owner: apps/api/internal/contentitem
  table: workflow_runs
  dto_style: snake_case
  routes:
    - [GET, /api/v1/content-workflow-runs]
    - [GET, /api/v1/content-workflow-runs/{workflowRunId}]
  consumers: [global-lite, project-works, content-rewrite-detail]
  migration: No legacy data migration to workflow_run_records.

deferred:
  - real n8n Adapter
  - Worker and queue consumption
  - callback server and external execution
  - WorkflowConnection verify/enable/disable
  - WorkflowConfiguration verify/enable/disable
  - CF-14-N8N-Integration
