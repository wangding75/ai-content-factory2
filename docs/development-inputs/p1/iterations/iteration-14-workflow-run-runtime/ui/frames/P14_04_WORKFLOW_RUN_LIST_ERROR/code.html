<body class="bg-background text-on-surface font-body m-0 p-0 flex h-screen overflow-hidden">
<!-- SideNavBar -->
<nav class="bg-surface-container-lowest border-r border-outline-variant flex flex-col h-full py-6 px-3 w-64 flex-shrink-0 z-20">

</div>
<div>
<h1 class="text-lg font-headline font-bold text-on-surface leading-tight">AI Content Factory</h1>
<span class="text-xs text-on-surface-variant">v2.0 商业化版</span>
</div>
</div>
<!-- Navigation Links -->
<div class="flex-1 space-y-1">
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors duration-200" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-body text-label-sm tracking-wide">概览</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors duration-200" href="#">
<span class="material-symbols-outlined">event_note</span>
<span class="font-body text-label-sm tracking-wide">项目规划</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors duration-200" href="#">
<span class="material-symbols-outlined">auto_awesome</span>
<span class="font-body text-label-sm tracking-wide">内容生产</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg bg-secondary-container text-on-secondary-container font-bold scale-95 duration-150" href="#">
<span class="material-symbols-outlined">account_tree</span>
<span class="font-body text-label-sm tracking-wide">流程中心</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high transition-colors duration-200" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-body text-label-sm tracking-wide">项目设置</span>
</a>
</div>
</nav>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col min-w-0 overflow-hidden">
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant h-16 flex justify-between items-center px-8 flex-shrink-0 z-10">
<!-- Left Side: Breadcrumb & Title -->
<div class="flex items-center gap-4">
<div class="flex flex-col">
<div class="flex items-center gap-2 text-sm text-on-surface-variant">
<span>流程中心</span>
<span class="material-symbols-outlined text-sm">chevron_right</span>
<span class="font-medium text-primary">运行记录</span>
</div>
</div>
<div class="h-6 w-px bg-outline-variant mx-2"></div>
<span class="text-sm text-on-surface-variant">统一查看所有项目的工作流运行情况</span>
</div>
<!-- Right Side: Actions & Profile -->
<div class="flex items-center gap-6">
<!-- Navigation Links (from JSON) -->
<div class="flex gap-4">
<a class="text-primary border-b-2 border-primary pb-1 font-medium text-sm" href="#">运行记录</a>
</div>
<div class="h-6 w-px bg-outline-variant"></div>
<!-- Icons & Primary Action -->
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary transition-all opacity-80">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-all opacity-80">
<span class="material-symbols-outlined">help_outline</span>
</button>
<button class="bg-primary text-on-primary px-4 py-1.5 rounded text-sm font-medium hover:bg-primary-dim transition-colors flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-sm">download</span>

                    </button>

</div>
</div>
</header>
<!-- Canvas -->
<main class="flex-1 overflow-auto bg-[#F9FAFB] p-8">
<div class="max-w-7xl mx-auto flex flex-col gap-6">
<!-- Stats Cards -->
<div class="grid grid-cols-4 gap-4">
<div class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant flex flex-col gap-1">
<span class="text-sm text-on-surface-variant font-medium">全部运行</span>
<span class="text-2xl font-headline font-semibold text-on-surface">—</span>
</div>
<div class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant flex flex-col gap-1">
<span class="text-sm text-on-surface-variant font-medium">运行中</span>
<span class="text-2xl font-headline font-semibold text-on-surface">—</span>
</div>
<div class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant flex flex-col gap-1">
<span class="text-sm text-on-surface-variant font-medium">成功</span>
<span class="text-2xl font-headline font-semibold text-on-surface">—</span>
</div>
<div class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant flex flex-col gap-1">
<span class="text-sm text-on-surface-variant font-medium">失败</span>
<span class="text-2xl font-headline font-semibold text-on-surface">—</span>
</div>
</div>
<!-- Filter Bar -->
<div class="bg-surface-container-lowest p-4 rounded-lg border border-outline-variant flex items-center gap-3 opacity-60 pointer-events-none">

<div class="relative flex-1 min-w-[200px] max-w-[300px]">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
<input class="w-full pl-9 pr-3 py-1.5 text-sm rounded border border-outline-variant bg-surface-container-low text-on-surface-variant placeholder:text-on-surface-variant/50 focus:ring-0 focus:border-outline-variant" disabled="" placeholder="搜索运行编号" type="text"/>
</div>

<div class="flex items-center gap-2 overflow-x-auto">
<button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded bg-surface-container-lowest text-sm text-on-surface-variant" disabled="">

</button>
<button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded bg-surface-container-lowest text-sm text-on-surface-variant" disabled="">

</button>
<button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded bg-surface-container-lowest text-sm text-on-surface-variant" disabled="">

</button>
<button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded bg-surface-container-lowest text-sm text-on-surface-variant" disabled="">
                            状态 <span class="material-symbols-outlined text-xs">expand_more</span>
</button>
<button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded bg-surface-container-lowest text-sm text-on-surface-variant" disabled="">
                            时间范围 <span class="material-symbols-outlined text-xs">calendar_today</span>
</button>
</div>
</div>

<div class="bg-surface-container-lowest border border-outline-variant rounded-lg flex flex-col min-h-[400px]">

<div class="grid grid-cols-[1fr_1fr_1fr_1.5fr_1fr_1fr_1fr_1fr_1fr] gap-4 p-4 border-b border-outline-variant bg-surface-container-low/50 text-xs font-medium text-on-surface-variant uppercase tracking-wider">
<div>运行编号</div>
<div>项目</div>
<div>业务环节</div>
<div>工作流名称</div>
<div>状态</div>
<div>触发来源</div>
<div>开始时间</div>
<div>耗时</div>
<div>操作</div>
</div>
<!-- Table Body (Error State) -->
<div class="flex-1 flex flex-col items-center justify-center p-12 text-center">
<div class="w-16 h-16 rounded-full bg-error-container/20 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-4xl text-error/80">error</span>
</div>
<h3 class="text-lg font-headline font-semibold text-on-surface mb-2">运行记录加载失败</h3>
<p class="text-sm text-on-surface-variant mb-1">暂时无法获取工作流运行记录，请稍后重试。</p>
<p class="text-xs text-on-surface-variant/70 mb-6 font-mono">错误编号：RUN-LIST-503</p>
<div class="flex items-center gap-4">
<button class="px-5 py-2 bg-primary text-on-primary rounded text-sm font-medium hover:bg-primary-dim transition-colors shadow-sm">
                                重新加载
                            </button>
<button class="px-5 py-2 border border-outline-variant text-on-surface-variant rounded text-sm font-medium hover:bg-surface-container-high transition-colors">
                                返回概览
                            </button>
</div>
</div>
</div>
