version: p0-v1
base_url: http://localhost:8080
rules:
  api_prefix: /api/v1
  response:
    data: any
    request_id: string
  p0_content_pack: novel
  p0_workflow_provider: mock
endpoints:
- iteration: '01'
  method: GET
  path: /healthz
  description: API 存活检查
- iteration: '01'
  method: GET
  path: /readyz
  description: PostgreSQL、Redis 依赖就绪检查
- iteration: '01'
  method: GET
  path: /api/v1/meta
  description: 版本、环境与 P0 能力元信息
- iteration: '02'
  method: GET
  path: /api/v1/home
  description: 首页聚合数据
- iteration: '02'
  method: GET
  path: /api/v1/projects
  description: 项目列表
- iteration: '02'
  method: POST
  path: /api/v1/projects
  description: 创建项目
- iteration: '02'
  method: GET
  path: /api/v1/projects/{projectId}
  description: 项目详情
- iteration: '02'
  method: PATCH
  path: /api/v1/projects/{projectId}
  description: 更新项目基础信息
- iteration: '02'
  method: GET
  path: /api/v1/projects/{projectId}/workspace
  description: 项目工作区聚合数据
- iteration: '03'
  method: GET
  path: /api/v1/projects/{projectId}/planning
  description: 读取项目策划
- iteration: '03'
  method: PUT
  path: /api/v1/projects/{projectId}/planning
  description: 保存项目策划
- iteration: '03'
  method: GET
  path: /api/v1/materials
  description: 全局素材查询
- iteration: '03'
  method: POST
  path: /api/v1/materials
  description: 创建全局素材
- iteration: '03'
  method: GET
  path: /api/v1/materials/{materialId}
  description: 素材详情
- iteration: '03'
  method: PATCH
  path: /api/v1/materials/{materialId}
  description: 编辑素材本体
- iteration: '03'
  method: GET
  path: /api/v1/projects/{projectId}/materials
  description: 项目素材列表
- iteration: '03'
  method: POST
  path: /api/v1/projects/{projectId}/materials
  description: 创建素材并绑定项目
- iteration: '03'
  method: POST
  path: /api/v1/projects/{projectId}/materials/{materialId}/binding
  description: 绑定已有素材
- iteration: '03'
  method: PATCH
  path: /api/v1/projects/{projectId}/materials/{materialId}/usage
  description: 编辑项目用途
- iteration: '03'
  method: DELETE
  path: /api/v1/projects/{projectId}/materials/{materialId}/binding
  description: 解除项目绑定
- iteration: '04'
  method: GET
  path: /api/v1/projects/{projectId}/storylines
  description: 故事线树
- iteration: '04'
  method: POST
  path: /api/v1/projects/{projectId}/storylines
  description: 创建主线
- iteration: '04'
  method: POST
  path: /api/v1/storylines/{storylineId}/children
  description: 创建子故事线
- iteration: '04'
  method: PATCH
  path: /api/v1/storylines/{storylineId}
  description: 编辑故事线
- iteration: '04'
  method: GET
  path: /api/v1/projects/{projectId}/foreshadowings
  description: 伏笔列表
- iteration: '04'
  method: POST
  path: /api/v1/projects/{projectId}/foreshadowings
  description: 创建伏笔
- iteration: '04'
  method: PATCH
  path: /api/v1/foreshadowings/{foreshadowingId}
  description: 编辑伏笔与状态
- iteration: '05'
  method: GET
  path: /api/v1/projects/{projectId}/chapter-plans
  description: 章节规划列表
- iteration: '05'
  method: POST
  path: /api/v1/projects/{projectId}/chapter-plans/mock-generate
  description: 模拟生成候选
- iteration: '05'
  method: GET
  path: /api/v1/chapter-plans/{chapterPlanId}
  description: 章节规划详情
- iteration: '05'
  method: PATCH
  path: /api/v1/chapter-plans/{chapterPlanId}
  description: 编辑候选规划
- iteration: '05'
  method: DELETE
  path: /api/v1/chapter-plans/{chapterPlanId}
  description: 删除未确认候选
- iteration: '05'
  method: POST
  path: /api/v1/projects/{projectId}/chapter-plans/confirm
  description: 批量确认候选
- iteration: '06'
  method: POST
  path: /api/v1/chapter-plans/{chapterPlanId}/content
  description: 为已确认章节创建内容单元
- iteration: '06'
  method: GET
  path: /api/v1/content-items/{contentItemId}
  description: 正文与当前版本详情
- iteration: '06'
  method: PUT
  path: /api/v1/content-items/{contentItemId}/draft
  description: 保存草稿
- iteration: '06'
  method: POST
  path: /api/v1/content-items/{contentItemId}/mock-generate
  description: 模拟生成正文
- iteration: '06'
  method: POST
  path: /api/v1/content-items/{contentItemId}/reviews/mock
  description: 执行模拟审核
- iteration: '06'
  method: GET
  path: /api/v1/content-items/{contentItemId}/reviews
  description: 审核历史
- iteration: '06'
  method: GET
  path: /api/v1/reviews/{reviewId}
  description: 审核详情
- iteration: '07'
  method: POST
  path: /api/v1/content-items/{contentItemId}/rewrites/mock
  description: 创建模拟重写任务
- iteration: '07'
  method: GET
  path: /api/v1/workflow-runs/{workflowRunId}
  description: 查询模拟任务
- iteration: '07'
  method: GET
  path: /api/v1/content-items/{contentItemId}/versions
  description: 版本列表
- iteration: '07'
  method: GET
  path: /api/v1/content-versions/{versionId}
  description: 版本详情
- iteration: '07'
  method: GET
  path: /api/v1/projects/{projectId}/works
  description: 项目作品列表
- iteration: '07'
  method: GET
  path: /api/v1/works/{workId}
  description: 项目作品聚合详情
- iteration: 08
  method: GET
  path: /api/v1/materials?scope=global
  description: 全局素材聚合
- iteration: 08
  method: GET
  path: /api/v1/works?scope=global
  description: 全局作品聚合
- iteration: 08
  method: GET
  path: /api/v1/workflows/builtin
  description: 内置模拟流程
- iteration: 08
  method: GET
  path: /api/v1/workflow-runs
  description: 全局流程执行摘要（只读）
- iteration: 08
  method: GET
  path: /api/v1/capabilities
  description: 能力状态
- iteration: 08
  method: GET
  path: /api/v1/integrations
  description: 外部集成状态
- iteration: 09
  method: ALL
  path: /api/v1/**
  description: 执行全部 P0 契约、集成与回归测试
