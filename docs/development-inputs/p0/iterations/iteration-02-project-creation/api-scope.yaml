iteration: '02'
name: 首页与项目创建闭环
endpoints:
- method: GET
  path: /api/v1/home
  description: 首页聚合数据
- method: GET
  path: /api/v1/projects
  description: 项目列表
- method: POST
  path: /api/v1/projects
