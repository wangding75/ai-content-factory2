name: ai-content-factory2

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_content_factory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_content_factory"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ./apps/api
    command: ["./migrate", "up"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_content_factory?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: development
      API_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_content_factory?sslmode=disable
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/meta"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_BASE_URL: http://api:8080/api/v1
    ports:
      - "13001:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
