name: ai-content-factory2

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acf}
      POSTGRES_USER: ${POSTGRES_USER:-acf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acf}
    ports:
      - "5432:5432"
    volumes:
      - acf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acf} -d ${POSTGRES_DB:-acf}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - acf_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./apps/api
      args:
        TARGET: api
    environment:
      APP_ENV: development
      API_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-acf}:${POSTGRES_PASSWORD:-acf}@postgres:5432/${POSTGRES_DB:-acf}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKFLOW_PROVIDER: mock
      CONTENT_PACKS: novel
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
      args:
        TARGET: worker
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-acf}:${POSTGRES_PASSWORD:-acf}@postgres:5432/${POSTGRES_DB:-acf}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKFLOW_PROVIDER: mock
      CONTENT_PACKS: novel
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  acf_postgres_data:
  acf_redis_data: